<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Produksi Lengkap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .status-efisien { color: green; font-weight: bold; }
        .status-tinggi { color: red; font-weight: bold; }
        .status-error { color: orange; font-weight: bold; }
        #hasilOutput { transition: all 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-light">
<header class="bg-info text-light text-center py-5 mb-4">
    <h1 class="fw-bold mb-2">Proyek Mini - Kalkulator Biaya Produksi</h1>
    <p class="fs-5 mb-0">Maessa Andrea Vallenia</p>
    <p class="mb-0">23051430044</p>
</header>
<main class="container my-5">
    <section class="mb-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <h4 class="text-center mb-4">Input Data Produksi</h4>
                <form id="formProduksi">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Biaya Bahan Baku (Rp)</label>
                            <input type="number" class="form-control" id="bahanBaku" min="0" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Biaya Tenaga Kerja (Rp)</label>
                            <input type="number" class="form-control" id="tenagaKerja" min="0" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Biaya Overhead (Rp)</label>
                            <input type="number" class="form-control" id="overhead" min="0" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Jumlah Produksi (Unit)</label>
                            <input type="number" class="form-control" id="jumlahProduksi" min="1" required>
                        </div>
                    </div>
                    <div class="mt-3">
                        <button type="submit" class="btn btn-primary w-100">Hitung Biaya</button>
                    </div>
                </form>
                <div id="hasilOutput" class="fw-semibold fs-5 mt-3 text-center"></div>
            </div>
        </div>
    </section>
    <section class="mb-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <h4 class="text-center mb-4">Rekap Produksi</h4>
                <table class="table table-bordered table-striped text-center">
                    <thead class="table-info">
                        <tr>
                            <th>#</th>
                            <th>Tanggal</th>
                            <th>Biaya Bahan Baku</th>
                            <th>Biaya Tenaga Kerja</th>
                            <th>Biaya Overhead</th>
                            <th>Jumlah Produksi</th>
                            <th>Total / Unit</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="rekapTable">
                        <tr>
                            <td colspan="8">Belum ada data</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</main>

<script>
const form = document.getElementById("formProduksi");
const output = document.getElementById("hasilOutput");
const rekapTable = document.getElementById("rekapTable");
let counter = 1;

form.addEventListener("submit", function(e){
    e.preventDefault();

    let biayaBahanBaku = Number(document.getElementById("bahanBaku").value);
    let biayaTenagaKerja = Number(document.getElementById("tenagaKerja").value);
    let biayaOverhead = Number(document.getElementById("overhead").value);
    let jumlahProduksi = Number(document.getElementById("jumlahProduksi").value);

    if(biayaBahanBaku < 0 || biayaTenagaKerja < 0 || biayaOverhead < 0 || jumlahProduksi < 1){
        output.textContent = "Input tidak valid!";
        output.className = "status-error fs-5 fw-semibold";
        console.error("Input tidak valid");
        return;
    }

    let totalPerUnit = (biayaBahanBaku + biayaTenagaKerja + biayaOverhead) / jumlahProduksi;

    let status = "";
    let kelasStatus = "";

    if(jumlahProduksi < 100){
        status = "Biaya Tinggi (Ekonomi Skala Kecil)";
        kelasStatus = "status-tinggi";
    } else {
        status = "Biaya Efisien";
        kelasStatus = "status-efisien";
    }

    let tanggal = new Date().toLocaleDateString("id-ID");

    output.innerHTML =
        `Tanggal: ${tanggal}<br>
        Total Biaya per Unit: Rp ${totalPerUnit.toLocaleString("id-ID")}<br>
        Status Produksi: ${status}`;

    output.className = `${kelasStatus} fs-5 fw-semibold`;

    let row = document.createElement("tr");
    row.innerHTML = `
        <td>${counter++}</td>
        <td>${tanggal}</td>
        <td>Rp ${biayaBahanBaku.toLocaleString("id-ID")}</td>
        <td>Rp ${biayaTenagaKerja.toLocaleString("id-ID")}</td>
        <td>Rp ${biayaOverhead.toLocaleString("id-ID")}</td>
        <td>${jumlahProduksi}</td>
        <td>Rp ${totalPerUnit.toLocaleString("id-ID")}</td>
        <td class="${kelasStatus}">${status}</td>
    `;

    if(rekapTable.children[0].children[0].colSpan === 8){
        rekapTable.innerHTML = "";
    }

    rekapTable.appendChild(row);

    console.log("===== RINCIAN PRODUKSI =====");
    console.log("Biaya Bahan Baku:", biayaBahanBaku);
    console.log("Biaya Tenaga Kerja:", biayaTenagaKerja);
    console.log("Biaya Overhead:", biayaOverhead);
    console.log("Jumlah Produksi:", jumlahProduksi);
    console.log("Total per Unit:", totalPerUnit);
    console.log("Status:", status);

    form.reset();
});
</script>

</body>

</html>
