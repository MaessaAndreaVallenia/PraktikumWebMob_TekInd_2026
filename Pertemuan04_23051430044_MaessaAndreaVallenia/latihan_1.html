<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Project - Kalkulator Gaji Lembur</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <header class="bg-info text-light text-center py-5 mb-4">
        <h1 class="fw-bold">Latihan 1 - Kalkulator Gaji Lembur</h1>
        <p class="mb-0">Maessa Andrea Vallenia</p>
        <p>23051430044</p>
    </header>


    <!-- FORM INPUT -->
    <section class="container mb-5">

        <div class="card shadow-sm">

            <div class="card-body">

                <h4 class="text-center mb-4">Input Data Karyawan</h4>

                <form id="formGaji">

                    <div class="row g-3">

                        <div class="col-md-4">
                            <label class="form-label">Nama</label>
                            <input type="text" id="nama" class="form-control" required>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Gaji Pokok</label>
                            <input type="number" id="gajiPokok" class="form-control" required>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Jam Lembur</label>
                            <input type="number" id="jamLembur" class="form-control" required>
                        </div>

                    </div>

                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary w-100">
                            Hitung Gaji
                        </button>
                    </div>

                </form>

            </div>

        </div>

    </section>


    <!-- TABEL REKAP -->
    <section class="container mb-5">

        <div class="card shadow-sm">

            <div class="card-body">

                <h4 class="text-center mb-4">Rekap Perhitungan Gaji</h4>

                <table class="table table-bordered table-striped text-center">

                    <thead class="table-info">
                        <tr>
                            <th>Nama</th>
                            <th>Gaji Pokok</th>
                            <th>Jam Lembur</th>
                            <th>Upah Lembur / Jam</th>
                            <th>Total Upah Lembur</th>
                            <th>Total Gaji</th>
                        </tr>
                    </thead>

                    <tbody id="rekapTable">

                        <tr>
                            <td colspan="6">Belum ada data</td>
                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </section>

    <script src="latihan_1.js"></script>

</body>

</html>
