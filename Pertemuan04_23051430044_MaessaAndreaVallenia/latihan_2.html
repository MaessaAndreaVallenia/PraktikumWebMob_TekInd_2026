<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Karyawan - Rekap Shift</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- HEADER -->
    <header class="bg-info text-light text-center py-5 mb-4">
        <h1 class="fw-bold mb-2">Absensi Karyawan - Rekap Shift</h1>
        <p class="fs-5 mb-0">Maessa Andrea Vallenia</p>
        <p class="mb-0">23051430044</p>
    </header>


    <!-- FORM INPUT -->
    <section class="container mb-5">

        <div class="card shadow-sm">

            <div class="card-body">

                <h4 class="mb-3">Input Data Karyawan</h4>

                <div class="row g-3">

                    <div class="col-md-6">
                        <input 
                            type="text"
                            id="nama"
                            class="form-control"
                            placeholder="Nama Karyawan"
                        >
                    </div>

                    <div class="col-md-6">
                        <input 
                            type="date"
                            id="tanggal"
                            class="form-control"
                        >
                    </div>

                </div>

                <div class="mt-3">

                    <button 
                        id="btnShift"
                        class="btn btn-primary w-100"
                    >
                        Masukkan Shift
                    </button>

                </div>

                <div 
                    id="hasilOutput"
                    class="mt-3 fw-bold fs-5 text-center"
                >
                </div>

            </div>

        </div>

    </section>


    <!-- TABEL REKAP -->
    <section class="container mb-5">

        <div class="card shadow-sm">

            <div class="card-body">

                <h4 class="mb-3">Rekap Data Karyawan</h4>

                <table class="table table-bordered table-striped text-center">

                    <thead class="table-info">

                        <tr>
                            <th>Nama</th>
                            <th>Tanggal</th>
                            <th>Shift</th>
                            <th>Status</th>
                        </tr>

                    </thead>

                    <tbody id="rekapTable">

                        <tr>
                            <td colspan="4">Belum ada data</td>
                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </section>


<script>

const tombol = document.getElementById("btnShift");
const output = document.getElementById("hasilOutput");
const tabel = document.getElementById("rekapTable");


tombol.addEventListener("click", function () {

    console.log("===== PROSES INPUT DATA =====");

    let nama = document.getElementById("nama").value.trim();
    let tanggal = document.getElementById("tanggal").value;

    console.log("Nama:", nama);
    console.log("Tanggal:", tanggal);

    let shift = Number(
        prompt("Masukkan kode shift\n1 = Pagi\n2 = Siang\n3 = Malam")
    );

    console.log("Kode Shift:", shift);


    if (!nama || !tanggal || ![1,2,3].includes(shift)) {

        console.error("Data tidak valid");

        output.textContent = "Data tidak valid!";
        output.style.color = "red";

        return;
    }


    let shiftText;

    if (shift === 1) {
        shiftText = "Pagi";
    }

    else if (shift === 2) {
        shiftText = "Siang";
    }

    else {
        shiftText = "Malam";
    }

    console.log("Shift:", shiftText);


    output.textContent = nama + " - Shift " + shiftText;
    output.style.color = "green";


    let barisBaru = document.createElement("tr");

    barisBaru.innerHTML =
        "<td>" + nama + "</td>" +
        "<td>" + tanggal + "</td>" +
        "<td>" + shiftText + "</td>" +
        "<td style='color:green'>Valid</td>";


    if (tabel.children[0].children[0].colSpan === 4) {

        tabel.innerHTML = "";
        console.log("Placeholder 'Belum ada data' dihapus");

    }

    tabel.appendChild(barisBaru);

    console.log("Data berhasil masuk ke tabel");
    console.log("=============================");


    document.getElementById("nama").value = "";
    document.getElementById("tanggal").value = "";

});

</script>


</body>
</html>
