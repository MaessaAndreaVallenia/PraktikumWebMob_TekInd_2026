<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Laporan Insiden</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="ProyekMini.css">
</head>

<body class="container mt-5">

    <!-- HEADER -->
    <div class="header-box text-center mb-4">
        <h2 class="fw-bold">Dashboard Laporan Insiden</h2>
        <p class="mb-1">Maessa Andrea Vallenia</p>
        <p class="mb-0">23051430044</p>
    </div>

    <!-- CONTROL -->
    <div class="row g-2 mb-3">

        <!-- Tombol Load -->
        <div class="col-md-2">
            <button id="btnLoad" class="btn btn-dark w-100">
                Muat Laporan
            </button>
        </div>

        <!-- Tombol Reset -->
        <div class="col-md-2">
            <button id="btnReset" class="btn btn-secondary w-100">
                Reset
            </button>
        </div>

        <!-- Cari Judul -->
        <div class="col-md-4">
            <input 
                type="text" 
                id="searchInput" 
                class="form-control"
                placeholder="Cari judul insiden..."
            >
        </div>

        <!-- Cari ID -->
        <div class="col-md-2">
            <input 
                type="number" 
                id="filterId" 
                class="form-control"
                placeholder="Cari ID"
            >
        </div>

        <!-- Dropdown Status -->
        <div class="col-md-2">
            <select id="filterStatus" class="form-select">
                <option value="semua">Semua Status</option>
                <option value="pending">Pending</option>
                <option value="selesai">Selesai</option>
            </select>
        </div>

    </div>

    <!-- LOADING -->
    <div class="mb-3">
        <div id="loading" class="spinner-border text-dark d-none" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- DATA -->
    <div class="row mt-3" id="containerInsiden">
        <!-- Card laporan akan muncul di sini -->
    </div>

    <!-- JS -->
    <script src="ProyekMini.js"></script>
</body>
</html>
