<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Produksi Harian</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

    <div class="row">

        <!-- FORM -->
        <div class="col-md-4">
            <div class="card">
                <div class="card-header">Input Data</div>
                <div class="card-body">
                    <form id="formProduksi">

                        <div class="mb-3">
                            <label>Tanggal</label>
                            <input type="date" id="tanggal" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label>Nama Operator</label>
                            <input type="text" id="operator" class="form-control" placeholder="Nama Lengkap" required>
                        </div>

                        <div class="mb-3">
                            <label>Shift</label>
                            <select id="shift" class="form-select" required>
                                <option value="Pagi">Pagi</option>
                                <option value="Siang">Siang</option>
                                <option value="Malam">Malam</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label>Jumlah Produksi</label>
                            <input type="number" id="jumlah" class="form-control" min="1" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Simpan Log</button>
                        <button type="button" id="btnHapusSemua" class="btn btn-danger w-100 mt-2">Hapus Semua Data</button>

                    </form>
                </div>
            </div>
        </div>

        <!-- TABEL -->
        <div class="col-md-8">
            <h3>Riwayat Produksi</h3>

            <!-- FILTER LATIHAN 1 -->
            <div class="mb-3">
                <input type="text" id="cariOperator" class="form-control" placeholder="Cari nama operator...">
            </div>
            <!-- FILTER LATIHAN 2 -->
            <button id="btnSort" class="btn btn-success mb-3">
                Sortir Jumlah (Terbesar)
            </button>
            <table class="table table-bordered table-striped">
                <thead class="table-dark">
                    <tr>
                        <th>Tanggal</th>
                        <th>Operator</th>
                        <th>Shift</th>
                        <th>Jumlah</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tabelBody"></tbody>
            </table>
        </div>

    </div>

<script src="latihan2.js"></script>
</body>
</html>
