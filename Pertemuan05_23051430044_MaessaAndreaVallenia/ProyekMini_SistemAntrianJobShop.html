<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProyekMini_(SistemAntrianJobShop)</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="ProyekMini_SistemAntrianJobShop.css" rel="stylesheet">
</head>
<body>

<header>
    <h1>ProyekMini - Sistem Antrian Job Shop</h1>
    <h6>Maessa Andrea Vallenia</h6>
    <p>23051430044</p>
</header>

<div class="container py-3">

    <!-- CARD UTAMA: Tombol proses -->
    <div class="card shadow card-custom border-primary mb-4 p-3">
        <div class="card-body text-center">
            <h4 class="mb-3">Simulasi Antrian Mesin</h4>
            <button id="btnProses" class="btn btn-primary w-50">Proses Antrian</button>
            <div id="hasilOutput" class="alert alert-success mt-3">Hasil akan muncul di sini</div>
        </div>
    </div>

    <!-- CARD REKAP: tabel antrian -->
    <div class="card shadow card-custom p-3">
        <div class="card-body">
            <h4 class="text-center mb-3">Rekap Antrian Mesin</h4>
            <table class="table table-bordered text-center">
                <thead class="table-info">
                    <tr><th>ID Job</th><th>Nama Proses</th><th>Durasi (menit)</th></tr>
                </thead>
                <tbody id="rekapTable">
                    <tr><td colspan="3">Belum ada data</td></tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<footer class="text-center mt-5 mb-3">
<small>Praktikum JavaScript</small>
</footer>

<script src="ProyekMini_SistemAntrianJobShop.js"></script>
</body>
</html>
