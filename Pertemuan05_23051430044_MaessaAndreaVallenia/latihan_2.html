<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latihan 2 - Array Manipulation</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- CSS khusus latihan 2 -->
<link href="latihan_2.css" rel="stylesheet">
</head>
<body>

<!-- HEADER -->
<header>
    <h1>Latihan 2 - Array Manipulation</h1>
    <h6>Maessa Andrea Vallenia</h6>
    <p>23051430044</p>
</header>

<div class="container py-3">

    <!-- CARD UTAMA: Pengecekan produk cacat -->
    <div class="card shadow card-custom border-primary mb-4 p-3">
        <div class="card-body text-center">
            <h4 class="mb-3">Pengecekan Produk Cacat</h4>
            <!-- Informasi array cacat -->
            <p>Daftar cacat: C-001, C-005, C-012, C-001, C-020</p>
            <p>Program menghitung jumlah "C-001"</p>
            <!-- Tombol tampilkan hasil -->
            <button id="btnTampil" class="btn btn-primary w-50">Tampilkan Hasil</button>
            <!-- Div untuk menampilkan hasil perhitungan -->
            <div id="hasilOutput" class="alert alert-success mt-3">Hasil akan muncul di sini</div>
        </div>
    </div>

    <!-- CARD REKAP: tabel rekap perhitungan -->
    <div class="card shadow card-custom p-3">
        <div class="card-body">
            <h4 class="text-center mb-3">Rekap Perhitungan</h4>
            <table class="table table-bordered text-center">
                <thead class="table-info">
                    <tr>
                        <th>Keterangan</th>
                        <th>Hasil</th>
                    </tr>
                </thead>
                <tbody id="rekapTable">
                    <!-- Default jika belum ada perhitungan -->
                    <tr><td colspan="2">Belum ada data</td></tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<!-- FOOTER -->
<footer class="text-center mt-5 mb-3">
<small>Praktikum JavaScript</small>
</footer>

<!-- Script JS -->
<script src="latihan_2.js"></script>
</body>
</html>
