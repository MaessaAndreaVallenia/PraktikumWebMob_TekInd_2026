<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pertemuan 5 - Function Energi</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .wrapper {
            max-width: 700px;
            margin: auto;
        }

        .rumus {
            font-size: 18px;
            font-weight: bold;
            color: #0d6efd;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header class="bg-info text-light text-center py-4 mb-4 shadow">
        <h1 class="fw-bold mb-1">Langkah 1 - Kalkulator Energi Mesin</h1>
        <p class="mb-0">Maessa Andrea Vallenia</p>
        <p class="mb-0">23051430044</p>
    </header>

    <div class="container wrapper">

        <!-- RUMUS -->
        <div class="card shadow mb-3">
            <div class="card-body text-center">
                <h5 class="mb-2">Kalkulator Daya Mesin</h5>
                <p class="mb-1">Rumus yang digunakan</p>
                <div class="rumus mb-2">P = V × I</div>
            </div>
        </div>

        <!-- INPUT -->
        <div class="card shadow mb-3">
            <div class="card-body text-center">

                <div class="mb-2">
                    <label>Tegangan (Volt)</label>
                    <input type="number" id="tegangan" class="form-control" value="220">
                </div>

                <div class="mb-2">
                    <label>Arus (Ampere)</label>
                    <input type="number" id="arus" class="form-control" value="10">
                </div>

                <button id="btnHitung" class="btn btn-primary w-100 mt-2">Hitung Energi</button>

                <div id="hasilOutput" class="alert alert-success mt-3 mb-0">
                    Hasil muncul di sini
                </div>

            </div>
        </div>

        <!-- TABEL -->
        <div class="card shadow">
            <div class="card-body">
                <h5 class="text-center mb-3">Rekap Perhitungan Energi</h5>

                <table class="table table-bordered text-center">
                    <thead class="table-info">
                        <tr>
                            <th>Rumus</th>
                            <th>Hasil</th>
                        </tr>
                    </thead>

                    <tbody id="rekapTable">
                        <tr>
                            <td colspan="2">Belum ada data</td>
                        </tr>
                    </tbody>
                </table>

            </div>
        </div>

    </div>

    <footer class="text-center mt-4 mb-2">
        <small>Praktikum JavaScript Pertemuan 5</small>
    </footer>

    <script src="praktikum_1.js"></script>

</body>

</html>
